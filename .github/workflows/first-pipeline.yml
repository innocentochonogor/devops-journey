name: My First CI Pipeline
on:
  push:
    branches:
      - main  
  pull_request:
    branches:
      - main

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Say hello
        run: echo "Hello from GitHub actions! This pipeline ran automatically."

      - name: Show current date
        run: date

      - name: List repo files
        run: ls -la

  check-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if network_check.sh exists
        run: |
          if [ -f "scripts/network_check.sh" ]; then
            echo "network_check.sh found"
          else
            echo "network_check.sh missing"
            exit 1
          fi
